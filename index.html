<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memo App</title>
</head>
<body>
    <!-- Iframe für die aktuelle Seite (Figma oder andere Website) -->
    <iframe
        id="main-frame"
        src="https://www.figma.com/proto/R7MTjNYH318PGIqlIzVnke/prototyp_app?page-id=0%3A1&node-id=420-820&viewport=-916%2C-2077%2C0.12&t=NrcMTV6miU8ra6p8-1&scaling=scale-down&content-scaling=fixed&starting-point-node-id=250%3A176&show-proto-sidebar=1"
        allowfullscreen
        allow="clipboard-write; clipboard-read"
    ></iframe>

    <script>
        const iframe = document.getElementById('main-frame');
        
        // Tastatureingaben abfangen
        let cmdLPressed = false;
        let inputBuffer = '';

        document.addEventListener('keydown', (event) => {
            // Prüfen auf CMD+L (Mac) oder STRG+L (Windows/Linux)
            if ((event.metaKey || event.ctrlKey) && event.key.toLowerCase() === 'l') {
                event.preventDefault(); // Standardverhalten (Adressfokus) unterdrücken
                cmdLPressed = true;
                inputBuffer = '';
                return;
            }

            // Wenn CMD+L zuvor gedrückt wurde, Eingaben sammeln
            if (cmdLPressed) {
                // Enter drücken → URL im Iframe laden
                if (event.key === 'Enter') {
                    const url = inputBuffer.trim();
                    if (url) {
                        // Prüfen, ob Protokoll fehlt, falls ja https:// voranstellen
                        let finalUrl = url;
                        if (!/^https?:\/\//i.test(url)) {
                            finalUrl = 'https://' + url;
                        }
                        // URL im Iframe laden (nicht window.location!)
                        iframe.src = finalUrl;
                    }
                    cmdLPressed = false;
                    inputBuffer = '';
                    event.preventDefault();
                }
                // Escape drücken → Abbruch
                else if (event.key === 'Escape') {
                    cmdLPressed = false;
                    inputBuffer = '';
                    event.preventDefault();
                }
                // Normale Zeichen sammeln (keine Modifier-Tasten)
                else if (!event.ctrlKey && !event.metaKey && !event.altKey && event.key.length === 1) {
                    inputBuffer += event.key;
                    event.preventDefault();
                }
            }
        });
    </script>
</body>
</html>
