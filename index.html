<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Figma Prototype Embed</title>
    <style>
        /* Basis-Styles – kein erzwungenes Vollbild */
        html, body {
            margin: 0;
            padding: 0;
            min-height: 100%;
            background: #fff;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        /* Optional: Zentrierter Hinweis für die Startseite */
        .hint {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            color: #555;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <!-- Optionaler Hinweis auf der Startseite -->
    <div class="hint">
        <p>
            Drücke <strong>CMD+L</strong> (Mac) bzw. <strong>STRG+L</strong> (Windows),<br>
            gib eine Domain ein und drücke <strong>Enter</strong>, um eine Website zu öffnen.
        </p>
    </div>

    <script>
        // Tastatureingaben abfangen
        let cmdLPressed = false;
        let inputBuffer = '';

        document.addEventListener('keydown', (event) => {
            // Prüfen auf CMD+L (Mac) oder STRG+L (Windows/Linux)
            if ((event.metaKey || event.ctrlKey) && event.key.toLowerCase() === 'l') {
                event.preventDefault();
                cmdLPressed = true;
                inputBuffer = '';
                return;
            }

            // Wenn CMD+L zuvor gedrückt wurde, Eingaben sammeln
            if (cmdLPressed) {
                // Enter drücken → URL in neuem Tab öffnen
                if (event.key === 'Enter') {
                    const url = inputBuffer.trim();
                    if (url) {
                        let finalUrl = url;
                        if (!/^https?:\/\//i.test(url)) {
                            finalUrl = 'https://' + url;
                        }
                        // In neuem Tab öffnen
                        window.open(finalUrl, '_blank');
                    }
                    cmdLPressed = false;
                    inputBuffer = '';
                    event.preventDefault();
                }
                // Escape drücken → Abbruch
                else if (event.key === 'Escape') {
                    cmdLPressed = false;
                    inputBuffer = '';
                    event.preventDefault();
                }
                // Normale Zeichen sammeln (keine Modifier-Tasten)
                else if (!event.ctrlKey && !event.metaKey && !event.altKey && event.key.length === 1) {
                    inputBuffer += event.key;
                    event.preventDefault();
                }
            }
        });
    </script>
</body>
</html>
