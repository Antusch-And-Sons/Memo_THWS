<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Figma Prototype Embed</title>
    <style>
        /* Vollbild-Layout ohne Ränder */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>
    <!-- Figma Prototype als Iframe einbetten -->
    <iframe
        id="figma-frame"
        src="https://embed.figma.com/proto/R7MTjNYH318PGIqlIzVnke?node-id=230-431&starting-point-node-id=250%3A176&embed-host=github-pages&viewport=-916%2C-2077%2C0.12&scaling=scale-down&content-scaling=fixed"
        allowfullscreen
        allow="clipboard-write; clipboard-read"
    ></iframe>

    <script>
        // Tastatureingaben abfangen
        let cmdLPressed = false;
        let inputBuffer = '';

        document.addEventListener('keydown', (event) => {
            // Prüfen auf CMD+L (Mac) oder STRG+L (Windows/Linux)
            if ((event.metaKey || event.ctrlKey) && event.key.toLowerCase() === 'l') {
                event.preventDefault(); // Standardverhalten (Adressfokus) unterdrücken
                cmdLPressed = true;
                inputBuffer = '';
                return;
            }

            // Wenn CMD+L zuvor gedrückt wurde, Eingaben sammeln
            if (cmdLPressed) {
                // Enter drücken → URL aufrufen
                if (event.key === 'Enter') {
                    const url = inputBuffer.trim();
                    if (url) {
                        // Prüfen, ob Protokoll fehlt, falls ja https:// voranstellen
                        let finalUrl = url;
                        if (!/^https?:\/\//i.test(url)) {
                            finalUrl = 'https://' + url;
                        }
                        window.location.href = finalUrl;
                    }
                    cmdLPressed = false;
                    inputBuffer = '';
                    event.preventDefault();
                }
                // Escape drücken → Abbruch
                else if (event.key === 'Escape') {
                    cmdLPressed = false;
                    inputBuffer = '';
                    event.preventDefault();
                }
                // Normale Zeichen sammeln (keine Modifier-Tasten)
                else if (!event.ctrlKey && !event.metaKey && !event.altKey && event.key.length === 1) {
                    inputBuffer += event.key;
                    event.preventDefault();
                }
            }
        });
    </script>
</body>
</html>
